services:
  toolhub:
    container_name: next-ai-toolhub
    build:
      context: ../toolhub
      dockerfile: Dockerfile
    image: next-ai-toolhub:latest
    init: true
    expose:
      - "3100"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3100
      TOOLHUB_CONFIG_PATH: /tmp/toolhub.config.json
      TOOLHUB_MANAGEMENT_AUTH_ENABLED: "true"
      TOOLHUB_MANAGEMENT_TOKEN: ${TOOLHUB_MANAGEMENT_TOKEN:?set TOOLHUB_MANAGEMENT_TOKEN}
      TOOLHUB_MANAGEMENT_HEADER_NAME: ${TOOLHUB_MANAGEMENT_HEADER_NAME:-x-toolhub-admin-key}
      CXXFLAGS: ${TOOLHUB_CXXFLAGS:--std=gnu++20}
      npm_config_cxxflags: ${TOOLHUB_CXXFLAGS:--std=gnu++20}
      npm_config_cppstd: ${TOOLHUB_CPPSTD:-20}
      MCP_REMOTE_KEY: ${MCP_REMOTE_KEY:?set MCP_REMOTE_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:?set MINIMAX_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://open.bigmodel.cn/api/anthropic}
      CODE_TOOL_SEARCH_MODEL: ${CODE_TOOL_SEARCH_MODEL:-glm-5-turbo}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-glm-5-turbo}
    command:
      - sh
      - -c
      - |
        node -e '
        const fs = require("fs");
        const input = fs.readFileSync("/app/toolhub.config.template.json", "utf8");
        let rendered = input;
        for (const [placeholder, name] of Object.entries({
          "__MCP_REMOTE_KEY__": "MCP_REMOTE_KEY",
          "__MINIMAX_API_KEY__": "MINIMAX_API_KEY"
        })) {
          const value = process.env[name];
          if (!value) throw new Error("Missing required environment variable: " + name);
          rendered = rendered.split(placeholder).join(JSON.stringify(value).slice(1, -1));
        }
        fs.writeFileSync("/tmp/toolhub.config.json", rendered);
        ' && npm start
    volumes:
      - ./toolhub.config.compose.json:/app/toolhub.config.template.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  gateway:
    container_name: next-ai-gateway
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    init: true
    ports:
      - "${GATEWAY_BIND_ADDRESS:-127.0.0.1}:${GATEWAY_PUBLISHED_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      GATEWAY_CONFIG_PATH: /app/gateway.config.json
      AUTH_ENABLED: "true"
      AUTH_MODE: static_api_key
      AUTH_STATIC_API_KEYS: ${AUTH_STATIC_API_KEYS:?set AUTH_STATIC_API_KEYS}
      MANAGER_API_KEY: ${MANAGER_API_KEY:?set MANAGER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      MCP_REMOTE_KEY: ${MCP_REMOTE_KEY:?set MCP_REMOTE_KEY}
    depends_on:
      toolhub:
        condition: service_healthy
    volumes:
      - ./gateway.config.compose.json:/app/gateway.config.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
